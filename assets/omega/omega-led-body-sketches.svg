<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="Torus and Echosahedron LED sketches">
  <defs>
    <style>
      .panel { fill: #fbfdff; stroke: #d0d7de; stroke-width: 1.6; rx: 12; }
      .torus { fill: #e7f1ff; stroke: #234a73; stroke-width: 3; }
      .void { fill: #fbfdff; stroke: #234a73; stroke-width: 3; }
      .ech { fill: #eef8ec; stroke: #3f6d35; stroke-width: 3; }
      .edge { stroke: #3f6d35; stroke-width: 2; }
      .led { fill: #e11d48; stroke: #7f1d1d; stroke-width: 1.4; }
      .det { fill: #0ea5a4; stroke: #134e4a; stroke-width: 1.2; }
      .ray { stroke: #f59e0b; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; }
      .text { font: 17px Arial, sans-serif; fill: #1f2933; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .tiny { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect x="25" y="24" width="410" height="335" class="panel"/>
  <text x="230" y="57" text-anchor="middle" class="text">Torus Body With LED Boundary Points</text>
  <text x="230" y="80" text-anchor="middle" class="small">ring recurrence supports repeated mixing</text>

  <ellipse cx="230" cy="194" rx="132" ry="88" class="torus"/>
  <ellipse cx="230" cy="194" rx="54" ry="36" class="void"/>
  <path class="ray" d="M132 162 C182 112 280 112 328 162"/>
  <path class="ray" d="M331 224 C280 277 182 276 130 224"/>
  <path class="ray" d="M176 130 C210 178 252 206 297 257"/>
  <path class="ray" d="M295 130 C260 175 217 209 163 258"/>

  <circle cx="230" cy="92" r="8" class="led"/>
  <circle cx="298" cy="111" r="8" class="led"/>
  <circle cx="350" cy="161" r="8" class="led"/>
  <circle cx="363" cy="214" r="8" class="led"/>
  <circle cx="330" cy="264" r="8" class="led"/>
  <circle cx="269" cy="293" r="8" class="led"/>
  <circle cx="191" cy="293" r="8" class="led"/>
  <circle cx="130" cy="264" r="8" class="led"/>
  <circle cx="97" cy="214" r="8" class="led"/>
  <circle cx="110" cy="161" r="8" class="led"/>
  <circle cx="162" cy="111" r="8" class="led"/>
  <circle cx="230" cy="296" r="8" class="det"/>

  <text x="230" y="320" text-anchor="middle" class="small">LED boundary pattern enters the ring.</text>
  <text x="230" y="339" text-anchor="middle" class="small">Readout samples which paths reinforce.</text>

  <rect x="485" y="24" width="410" height="335" class="panel"/>
  <text x="690" y="57" text-anchor="middle" class="text">Echosahedron Reference With LEDs</text>
  <text x="690" y="80" text-anchor="middle" class="small">balanced geometry supports cross-checking</text>

  <polygon points="690,101 795,166 755,286 625,286 585,166" class="ech"/>
  <line x1="690" y1="101" x2="625" y2="286" class="edge"/>
  <line x1="690" y1="101" x2="755" y2="286" class="edge"/>
  <line x1="585" y1="166" x2="795" y2="166" class="edge"/>
  <line x1="625" y1="286" x2="795" y2="166" class="edge"/>
  <line x1="755" y1="286" x2="585" y2="166" class="edge"/>
  <line x1="690" y1="101" x2="690" y2="213" class="edge"/>
  <line x1="585" y1="166" x2="690" y2="213" class="edge"/>
  <line x1="795" y1="166" x2="690" y2="213" class="edge"/>
  <line x1="625" y1="286" x2="690" y2="213" class="edge"/>
  <line x1="755" y1="286" x2="690" y2="213" class="edge"/>

  <circle cx="690" cy="101" r="8" class="led"/>
  <circle cx="795" cy="166" r="8" class="led"/>
  <circle cx="755" cy="286" r="8" class="led"/>
  <circle cx="625" cy="286" r="8" class="led"/>
  <circle cx="585" cy="166" r="8" class="led"/>
  <circle cx="690" cy="213" r="8" class="det"/>
  <circle cx="655" cy="154" r="7" class="led"/>
  <circle cx="725" cy="154" r="7" class="led"/>
  <circle cx="737" cy="229" r="7" class="led"/>
  <circle cx="643" cy="229" r="7" class="led"/>

  <text x="690" y="320" text-anchor="middle" class="small">Symmetry makes disagreements visible.</text>
  <text x="690" y="339" text-anchor="middle" class="small">A candidate can be checked across a different body.</text>

  <circle cx="58" cy="384" r="6" class="led"/>
  <text x="70" y="388" class="tiny">LED source point</text>
  <circle cx="181" cy="384" r="6" class="det"/>
  <text x="193" y="388" class="tiny">readout point</text>
</svg>
