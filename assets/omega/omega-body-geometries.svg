<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390" role="img" aria-label="OMEGA body geometry sketches">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2933"/>
    </marker>
    <style>
      .panel { fill: #fbfdff; stroke: #d0d7de; stroke-width: 1.6; rx: 12; }
      .body { fill: #e7f1ff; stroke: #234a73; stroke-width: 3; }
      .body2 { fill: #eef8ec; stroke: #3f6d35; stroke-width: 3; }
      .body3 { fill: #fff3df; stroke: #805a12; stroke-width: 3; }
      .port { fill: #ffffff; stroke: #1f2933; stroke-width: 1.8; }
      .path { stroke: #256d68; stroke-width: 2.2; fill: none; marker-end: url(#arrow2); }
      .dash { stroke: #8a5a00; stroke-width: 2; fill: none; stroke-dasharray: 6 5; }
      .text { font: 17px Arial, sans-serif; fill: #1f2933; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect x="20" y="24" width="275" height="335" class="panel"/>
  <text x="157.5" y="57" text-anchor="middle" class="text">Recurrent Torus</text>
  <text x="157.5" y="80" text-anchor="middle" class="small">feedback, repeated mixing, search lift</text>
  <ellipse cx="157.5" cy="185" rx="92" ry="68" class="body"/>
  <ellipse cx="157.5" cy="185" rx="38" ry="28" fill="#fbfdff" stroke="#234a73" stroke-width="3"/>
  <path class="path" d="M93 170 C122 115 194 116 222 170"/>
  <path class="path" d="M221 201 C192 256 121 254 94 201"/>
  <circle cx="157.5" cy="103" r="9" class="port"/>
  <circle cx="228" cy="133" r="9" class="port"/>
  <circle cx="246" cy="205" r="9" class="port"/>
  <circle cx="157.5" cy="267" r="9" class="port"/>
  <circle cx="69" cy="205" r="9" class="port"/>
  <circle cx="87" cy="133" r="9" class="port"/>
  <text x="157.5" y="310" text-anchor="middle" class="small">A loop body lets weak constraints</text>
  <text x="157.5" y="329" text-anchor="middle" class="small">interact across repeated paths.</text>

  <rect x="322.5" y="24" width="275" height="335" class="panel"/>
  <text x="460" y="57" text-anchor="middle" class="text">Symmetric Reference</text>
  <text x="460" y="80" text-anchor="middle" class="small">balanced couplings, cross-body check</text>
  <polygon points="460,98 540,150 512,252 408,252 380,150" class="body2"/>
  <line x1="460" y1="98" x2="408" y2="252" stroke="#3f6d35" stroke-width="2"/>
  <line x1="460" y1="98" x2="512" y2="252" stroke="#3f6d35" stroke-width="2"/>
  <line x1="380" y1="150" x2="540" y2="150" stroke="#3f6d35" stroke-width="2"/>
  <line x1="408" y1="252" x2="540" y2="150" stroke="#3f6d35" stroke-width="2"/>
  <line x1="512" y1="252" x2="380" y2="150" stroke="#3f6d35" stroke-width="2"/>
  <circle cx="460" cy="98" r="8" class="port"/>
  <circle cx="540" cy="150" r="8" class="port"/>
  <circle cx="512" cy="252" r="8" class="port"/>
  <circle cx="408" cy="252" r="8" class="port"/>
  <circle cx="380" cy="150" r="8" class="port"/>
  <circle cx="460" cy="184" r="8" class="port"/>
  <text x="460" y="310" text-anchor="middle" class="small">A symmetric body acts as a reference</text>
  <text x="460" y="329" text-anchor="middle" class="small">for repeatability and disagreement tests.</text>

  <rect x="625" y="24" width="275" height="335" class="panel"/>
  <text x="762.5" y="57" text-anchor="middle" class="text">Asymmetric Mixer</text>
  <text x="762.5" y="80" text-anchor="middle" class="small">mode separation, critic behavior</text>
  <path d="M705,113 C770,78 842,125 821,191 C804,245 742,278 689,234 C650,201 660,137 705,113 z" class="body3"/>
  <path class="dash" d="M690 135 C730 170 780 160 824 127"/>
  <path class="dash" d="M675 214 C725 200 756 230 812 218"/>
  <path class="path" d="M670 160 C716 130 764 135 816 172"/>
  <path class="path" d="M692 237 C736 216 778 222 824 247"/>
  <circle cx="688" cy="121" r="8" class="port"/>
  <circle cx="819" cy="133" r="8" class="port"/>
  <circle cx="835" cy="195" r="8" class="port"/>
  <circle cx="777" cy="268" r="8" class="port"/>
  <circle cx="676" cy="231" r="8" class="port"/>
  <circle cx="660" cy="169" r="8" class="port"/>
  <text x="762.5" y="310" text-anchor="middle" class="small">Broken symmetry helps separate</text>
  <text x="762.5" y="329" text-anchor="middle" class="small">residue classes and competing modes.</text>
</svg>
