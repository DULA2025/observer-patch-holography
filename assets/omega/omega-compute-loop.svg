<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="OMEGA compute loop">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f2933"/>
    </marker>
    <style>
      .box { fill: #f7fafc; stroke: #1f2933; stroke-width: 2; rx: 10; }
      .soft { fill: #edf7f6; stroke: #256d68; stroke-width: 2; rx: 10; }
      .hard { fill: #fff7e8; stroke: #8a5a00; stroke-width: 2; rx: 10; }
      .text { font: 17px Arial, sans-serif; fill: #1f2933; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .line { stroke: #1f2933; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .return { stroke: #256d68; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="20" y="88" width="145" height="82" class="box"/>
  <text x="92.5" y="120" text-anchor="middle" class="text">Task Target</text>
  <text x="92.5" y="145" text-anchor="middle" class="small">constraint, hash,</text>
  <text x="92.5" y="163" text-anchor="middle" class="small">factor, replay</text>

  <rect x="210" y="88" width="155" height="82" class="box"/>
  <text x="287.5" y="117" text-anchor="middle" class="text">Boundary</text>
  <text x="287.5" y="140" text-anchor="middle" class="text">Program</text>
  <text x="287.5" y="162" text-anchor="middle" class="small">port drive pattern</text>

  <rect x="410" y="70" width="170" height="118" class="hard"/>
  <text x="495" y="103" text-anchor="middle" class="text">Optical Chamber</text>
  <text x="495" y="130" text-anchor="middle" class="small">geometry mixes waves</text>
  <text x="495" y="150" text-anchor="middle" class="small">many paths contribute</text>
  <text x="495" y="170" text-anchor="middle" class="small">physical operator</text>

  <rect x="625" y="88" width="145" height="82" class="box"/>
  <text x="697.5" y="121" text-anchor="middle" class="text">Readout</text>
  <text x="697.5" y="145" text-anchor="middle" class="small">boundary samples</text>
  <text x="697.5" y="163" text-anchor="middle" class="small">features</text>

  <rect x="805" y="88" width="95" height="82" class="soft"/>
  <text x="852.5" y="121" text-anchor="middle" class="text">P-Layer</text>
  <text x="852.5" y="145" text-anchor="middle" class="small">exact</text>
  <text x="852.5" y="163" text-anchor="middle" class="small">verifier</text>

  <rect x="360" y="248" width="220" height="68" class="soft"/>
  <text x="470" y="278" text-anchor="middle" class="text">Mismatch And Repair</text>
  <text x="470" y="302" text-anchor="middle" class="small">update scorebook or rerank beam</text>

  <path class="line" d="M165 129 L210 129"/>
  <path class="line" d="M365 129 L410 129"/>
  <path class="line" d="M580 129 L625 129"/>
  <path class="line" d="M770 129 L805 129"/>
  <path class="return" d="M852 170 C820 225 650 236 580 248"/>
  <path class="return" d="M360 248 C260 238 248 205 288 170"/>

  <text x="70" y="245" class="small">Why the loop helps:</text>
  <text x="70" y="266" class="small">the chamber changes candidate order,</text>
  <text x="70" y="286" class="small">the verifier keeps truth digital,</text>
  <text x="70" y="306" class="small">the repair loop searches for stable lift.</text>
</svg>
